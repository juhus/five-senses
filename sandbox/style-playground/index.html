<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Senses</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#a3db33;--accent2:#E88D67;
  --bg:#FAF8F0;--surface:#FFFFFF;--surface2:#F0EDE3;
  --text:#111111;--muted:rgba(17,17,17,.45);
  --radius:22px;--radius-sm:15px;--pill:50px;
  --shadow:0 4px 20px rgba(0,0,0,.04);
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
input,select,textarea{font-family:var(--font)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-enter{animation:fadeIn .3s ease}
</style>
</head>
<body>
<div id="root"></div>
<script src="app.jsx" type="text/babel"></script>
</body>
</html>
