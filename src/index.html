<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Five Senses</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@0.577.0/dist/umd/lucide.min.js"></script>
<script src="data.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#a3db33;--accent2:#E88D67;
  --bg:#FAF8F0;--surface:#FFFFFF;--surface2:#F0EDE3;
  --text:#111111;--muted:rgba(17,17,17,.45);
  --radius:22px;--radius-sm:15px;--pill:50px;
  --shadow:0 4px 20px rgba(0,0,0,.04);
  --font:system-ui,-apple-system,'Segoe UI',sans-serif;
}
html,body{overflow-x:hidden;max-width:100vw}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent;border-radius:4px}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.12);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.2)}
*{scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.12) transparent}
input,select,textarea{font-family:var(--font)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.page-enter{animation:fadeIn .2s ease}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInBg{from{background:rgba(0,0,0,0)}to{background:rgba(0,0,0,.35)}}
@keyframes toastIn{from{opacity:0;transform:translateY(-12px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-12px) scale(.95)}}
.modal-backdrop{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeInBg .2s ease forwards}
.modal-panel{background:var(--surface);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:600px;max-height:85vh;overflow-y:auto;animation:slideUp .25s ease;padding:24px 20px 32px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:300;padding:12px 22px;border-radius:var(--pill);font-size:13px;font-weight:600;box-shadow:0 6px 24px rgba(0,0,0,.12);animation:toastIn .25s ease}
.toast-exit{animation:toastOut .2s ease forwards}
.toast-success{background:var(--accent);color:var(--text)}
.toast-error{background:var(--accent2);color:#fff}
.toast-info{background:var(--surface);color:var(--text);border:1px solid var(--surface2)}
</style>
</head>
<body>
<div id="root"></div>
<script src="app.jsx" type="text/babel"></script>
</body>
</html>
